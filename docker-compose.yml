services:
  portal:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - backend/.env
    environment:
      NODE_ENV: production
    restart: unless-stopped
    stop_grace_period: 15s
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
