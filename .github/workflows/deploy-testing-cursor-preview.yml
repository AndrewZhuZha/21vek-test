name: Deploy testing-cursor preview

on:
  push:
    branches: [testing-cursor]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-testing-cursor-preview
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout preview source
        uses: actions/checkout@v4
        with:
          ref: testing-cursor
          path: preview-source

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: site
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync preview into testing-cursor/
        run: |
          rm -rf site/testing-cursor
          mkdir -p site/testing-cursor
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='testing-cursor' \
            preview-source/ site/testing-cursor/
          sed -i 's|<head>|<head>\n    <base href="/21vek-test/testing-cursor/">|' site/testing-cursor/index.html
          cp site/testing-cursor/js/config.preview.js site/testing-cursor/js/config.local.js

      - name: Commit and push to main
        working-directory: site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add testing-cursor/
          if git diff --staged --quiet; then
            echo "No changes to deploy."
            exit 0
          fi
          git commit -m "Deploy testing-cursor preview to testing-cursor/"
          git push
