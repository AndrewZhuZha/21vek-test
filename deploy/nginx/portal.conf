# IT-портал 21vek — production nginx (scale mode)
# Статика с диска, API и SPA — на upstream Node (3+ реплики через Docker DNS).

# Docker embedded DNS — пере-резолв при scale portal=N
resolver 127.0.0.11 ipv6=off valid=10s;

limit_req_zone $binary_remote_addr zone=auth_login:10m rate=30r/m;

server {
    listen 80;
    server_name _;

    root /var/www/portal;
    index index.html;

    client_max_body_size 128k;

    set $portal_upstream portal;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Статика — не нагружает Node
    location ~* ^/(css|js|assets|errors)/ {
        try_files $uri =404;
        access_log off;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /robots.txt {
        try_files $uri =404;
        access_log off;
    }

    location = /favicon.ico {
        try_files /assets/favicon.svg =404;
        access_log off;
    }

    # API
    location /api/ {
        limit_req zone=auth_login burst=20 nodelay;

        proxy_pass http://$portal_upstream:3000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # SPA: главная и wiki
    location / {
        proxy_pass http://$portal_upstream:3000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
